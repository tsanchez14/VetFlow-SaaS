<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | VetFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f8f9fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 2rem 1rem;
        }

        .login-container {
            max-width: 400px;
            width: 100%;
            margin: auto;
        }

        .card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .btn-success {
            background-color: #1A7A4A;
            border: none;
            padding: 12px;
            border-radius: 10px;
        }
    </style>
</head>

<body>
    <div class="container login-container">
        <div class="text-center mb-4">
            <a href="index.html" class="text-decoration-none text-dark fw-bold fs-3"><i
                    class="fas fa-paw text-success"></i> VETFLOW</a>
        </div>

        <div class="card p-4">
            <h5 class="fw-bold mb-4 text-center">Ingresá a tu clínica</h5>
            <form id="login-form">
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" id="email" class="form-control" placeholder="tu@email.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Contraseña</label>
                    <div class="input-group">
                        <input type="password" id="password" class="form-control" placeholder="******" required>
                        <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" id="login-btn" class="btn btn-success w-100 mb-3">Ingresar</button>
                <div class="text-center mb-3">
                    <button type="button" id="demo-btn" class="btn btn-outline-secondary w-100">
                        <i class="fas fa-play-circle me-2"></i> Acceso de Prueba (Demo)
                    </button>
                </div>
                <div class="text-center">
                    <a href="#" class="text-muted small">¿Olvidaste tu contraseña?</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module">
        // Check for Demo flag
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('demo') === 'true') {
            document.getElementById('email').value = 'demo@vetflow.com';
            document.getElementById('password').value = 'demo123456';

            // Auto-submit after a tiny delay for visual feedback
            setTimeout(() => {
                document.getElementById('login-form').dispatchEvent(new Event('submit'));
            }, 500);
        }

        document.getElementById('demo-btn').onclick = () => {
            document.getElementById('email').value = 'demo@vetflow.com';
            document.getElementById('password').value = 'demo123456';
            document.getElementById('login-form').dispatchEvent(new Event('submit'));
        };

        document.getElementById('login-form').onsubmit = (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i> Iniciando Sesión...';

            // Simular login exitoso para la demo
            const tenantData = {
                id: 1,
                nombre: 'VetFlow',
                slug: 'vetflow',
                plan: 'pro',
                estado: 'activo',
                schemaName: 'public',
                config: { welcome_message: 'Bienvenido al panel de control' }
            };

            sessionStorage.setItem('vetflow_tenant_data', JSON.stringify(tenantData));

            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1000);
        };

        // Toggle Password Visibility
        document.getElementById('togglePassword').addEventListener('click', function () {
            const passwordInput = document.getElementById('password');
            const icon = this.querySelector('i');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });
    </script>
</body>

</html>
