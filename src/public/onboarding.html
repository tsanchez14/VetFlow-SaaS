<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onboarding | VetFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f8f9fa;
        }

        .onboarding-card {
            max-width: 600px;
            margin: 50px auto;
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .step-header {
            background: #1E3A5F;
            color: white;
            padding: 30px;
            border-radius: 20px 20px 0 0;
        }

        .btn-success {
            background-color: #1A7A4A;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card onboarding-card">
            <div class="step-header text-center">
                <i class="fas fa-rocket fa-3x mb-3 text-success"></i>
                <h3>¡Bienvenido a VetFlow!</h3>
                <p class="mb-0 opacity-75">Configurá tu clínica en 3 simples pasos</p>
            </div>
            <div class="card-body p-5">
                <div id="ob-step1">
                    <h5 class="fw-bold mb-4">Paso 1: Perfil de la Clínica</h5>
                    <div class="mb-4">
                        <label class="form-label">Logo de la Clínica (URL opcional)</label>
                        <input type="text" id="ob-logo" class="form-control" placeholder="https://...">
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Mensaje de bienvenida en tickets *</label>
                        <textarea id="ob-welcome" class="form-control" rows="2"
                            placeholder="Ej: ¡Gracias por confiar en nosotros!" required></textarea>
                    </div>
                    <div class="text-end">
                        <button class="btn btn-success" onclick="nextStep(2)">Continuar</button>
                    </div>
                </div>

                <div id="ob-step2" class="d-none">
                    <h5 class="fw-bold mb-4">Paso 2: Horarios de Atención</h5>
                    <div class="row g-3 mb-4">
                        <div class="col-6">
                            <label class="form-label">Apertura</label>
                            <input type="time" class="form-control" value="09:00">
                        </div>
                        <div class="col-6">
                            <label class="form-label">Cierre</label>
                            <input type="time" class="form-control" value="19:00">
                        </div>
                    </div>
                    <div class="text-end">
                        <button class="btn btn-outline-secondary me-2" onclick="nextStep(1)">Atrás</button>
                        <button class="btn btn-success" onclick="nextStep(3)">Continuar</button>
                    </div>
                </div>

                <div id="ob-step3" class="d-none">
                    <h5 class="fw-bold mb-4">Paso 3: ¡Todo listo!</h5>
                    <p>Ya podés empezar a usar VetFlow. Te recomendamos empezar agregando tus primeros productos al
                        Stock.</p>
                    <div class="text-center mt-5">
                        <button class="btn btn-success btn-lg" id="finish-btn">Ir al Dashboard</button>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <!-- Scripts Multitenant -->
    <script type="module" src="js/supabaseClient.js"></script>
    <script type="module" src="js/tenant-session.js"></script>
    <script type="module" src="js/onboarding.js"></script>

    <script>
        function nextStep(n) {
            // Validar si intentamos avanzar desde el paso 1
            if (n === 2) {
                const welcome = document.getElementById('ob-welcome');
                if (!welcome.value.trim()) {
                    welcome.classList.add('is-invalid');
                    alert('Por favor, ingresa un mensaje de bienvenida para continuar.');
                    return;
                }
                welcome.classList.remove('is-invalid');
            }

            document.getElementById('ob-step1').classList.add('d-none');
            document.getElementById('ob-step2').classList.add('d-none');
            document.getElementById('ob-step3').classList.add('d-none');
            document.getElementById('ob-step' + n).classList.remove('d-none');
        }
    </script>
</body>

</html>
