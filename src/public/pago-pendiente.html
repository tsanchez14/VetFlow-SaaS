<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suscripción Requerida | VetFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f8f9fa;
        }

        .payment-card {
            max-width: 800px;
            margin: 50px auto;
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }

        .payment-header {
            background: #e74c3c;
            color: white;
            padding: 40px;
            text-align: center;
        }

        .plan-box {
            border: 1px solid #eee;
            border-radius: 15px;
            padding: 20px;
            transition: all 0.3s;
        }

        .plan-box:hover {
            border-color: #1A7A4A;
            transform: translateY(-5px);
        }

        .btn-success {
            background-color: #1A7A4A;
            border: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card payment-card">
            <div class="payment-header">
                <i class="fas fa-exclamation-circle fa-4x mb-3"></i>
                <h2>Tu acceso se encuentra suspendido</h2>
                <p class="mb-0 opacity-75">Tu periodo de prueba ha vencido o el pago de tu suscripción no pudo
                    procesarse.</p>
            </div>
            <div class="card-body p-5">
                <h5 class="fw-bold mb-4 text-center">Elegí un plan para continuar operando tu clínica</h5>
                <div class="row g-4">
                    <div class="col-md-4">
                        <div class="plan-box text-center">
                            <h6>Básico</h6>
                            <div class="h3 fw-bold mb-3">9<small class="fs-6 fw-normal"> USD/mes</small></div>
                            <button class="btn btn-outline-success w-100 rounded-pill">Activar</button>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="plan-box text-center border-success" style="border-width: 2px;">
                            <h6 class="text-success">Pro</h6>
                            <div class="h3 fw-bold mb-3">15<small class="fs-6 fw-normal"> USD/mes</small></div>
                            <button class="btn btn-success w-100 rounded-pill">Activar</button>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="plan-box text-center">
                            <h6>Anual</h6>
                            <div class="h3 fw-bold mb-3">149<small class="fs-6 fw-normal"> USD/año</small></div>
                            <button class="btn btn-outline-success w-100 rounded-pill">Activar</button>
                        </div>
                    </div>
                </div>
                <div class="text-center mt-5">
                    <a href="login.html" class="text-muted">Cerrar sesión e intentar más tarde</a>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
